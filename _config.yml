title:            Computing, linguistics, music, and everything in between
description:      "Chris Cirefice's blog"
logo:             logo.jpg
disqus_shortname: cireficeblog
share:            true
dropcap:			    true
# Change url to your domain. Leave localhost server or blank when working locally.
# or use the hint from http://jekyllrb.com/docs/github-pages/ to keep this the same 
# whether working locally or remotely. Start Jekyll with: jekyll serve --baseurl ''
# If making local changes using Cloud9, make sure that the c9users URL is active.
# When publishing final changes, ensure that the cirefice.me URL is active.
# url:        	    https://my-blog-cireficc.c9users.io
url:              http://cirefice.me

# Owner/author information
owner:
  name:           Christopher S. Cirefice
  avatar:         avatar.jpg
  email:          cireficc@mail.gvsu.edu
  # Use the coder's toolbox at http://coderstoolbox.net/string/#!encoding=xml&action=encode&charset=us_ascii to encode your description into XML string
  description:    Computer Science, French, Japanese, Linguistics, Music, Tennis, Cooking
  # Social networking links used in footer. Update and remove as you like.
  twitter:        
  facebook:       chris.cirefice
  github:         cireficc
  instagram:      
  # For Google Authorship https://plus.google.com/authorship
  google_plus:    https://plus.google.com/+ChristopherCirefice
  linkedin:       chriscirefice

# Analytics and webmaster tools stuff goes here
google_analytics:   
google_verify:      
# https://ssl.bing.com/webmaster/configure/verify/ownership Option 2 content= goes here
bing_verify:         

# Links to include in footer navigation
# For external links add external: true
links:
  - title: Home
    url: /
    external: false
    icon: home
  - title: Featured Posts
    url: /featured
  - title: Categories
    url: /categories
  - title: Tags
    url: /tags
  - title: About
    url: /about

# http://en.wikipedia.org/wiki/List_of_tz_database_time_zones
timezone:    America/Detroit
future:      true
markdown:    kramdown
paginate:    5
paginate_path: "page:num"

# https://github.com/mojombo/jekyll/wiki/Permalinks
permalink:   /:categories/:title

kramdown:
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  input: GFM
  syntax_highlighter: rouge

gems: [jekyll-paginate]

include: [".htaccess"]
exclude: ["lib", "config.rb", "Gemfile", "Capfile", "Gemfile.lock", "config", "log", "Rakefile", "Rakefile.rb", "tmp", "less", "*.sublime-project", "*.sublime-workspace", "test", "spec", "Gruntfile.js", "package.json", "node_modules"]
